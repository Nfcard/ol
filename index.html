                  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> <style>
  body{

  }
  
        .offer-container {
          
            display: flex;
            align-items: center;
            padding: 20px;
            border: 1px solid #bdd4f5;
            margin: 1%;

        }
      .claim-button1 {
            background-color:#83aff0;
            color: black;
            border: none;
          border-radius:25px;
    font-size:28px;
            cursor: pointer;
            margin-right: 20px;
      }
        .claim-button {
            background-color:#eb3480;
            color: #fff;
            border: none;
          border-radius:25px;

</head>
<body>
<button class="claim-button1" onclick="window.history.back()"><i class="fas fa-circle-arrow-left"></i></button>
<div class="offer-container">
    <button class="claim-button" style="color:#1c7032" onclick="document.location='https://nfcard.github.io/login/loan.html'">Loan</button>
    <div class="offer-text">💰 Loan নিতে এখানে loan এ tap করো </div>
</div>
  <div class="offer-container">
    <button class="claim-button" onclick="ocument.location='https://nfcard.github.io/add/offer.html'">Claim</button>
    <div class="offer-text"> Bonus নিতে Claim করো 📢<p style="color:#1c7032" id="balance">Coming....</p></div>
</div>
  </div>
  <div class="offer-container">
    <button class="claim-button"style="color:#273a70" onclick="document.location='https://nfcard.github.io/pay/recharge.html'">Cashout</button>
    <div class="offer-text">টাকা বের করতে cashout এ tap করো। [ শুধু শুক্রবার এ ]<a href="https://nfcard.github.io/pay/order.html" >History<i class="fas fa-sync-alt"></i></a></div>
</div>

<script>
    function fetchData() {
        var url = 'https://docs.google.com/spreadsheets/d/1U72BoHdSqC1E_orTmcBYDShbQfErO9X-wQrPyBTzkTs/htmlview'; // Provided Google Sheets URL
        fetch(url)
            .then(response => response.text())
            .then(data => {
                var parser = new DOMParser();
                var htmlDoc = parser.parseFromString(data, 'text/html');
                var cellElement = htmlDoc.querySelectorAll('table')[0].rows[1].cells[4]; // Fetching data from the first table, row 2 column 4
                
                // Handling different types of cell content
                var cellText = cellElement.innerText || cellElement.textContent;
                document.getElementById('balance').innerText = cellText.trim();
            })
            .catch(error => console.error('Error fetching data:', error));
    }

    window.onload = fetchData;
</script>

</body>
</html>
